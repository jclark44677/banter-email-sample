<!DOCTYPE html>
<html>
<head>
    <title>Banter Email Preview</title>
    <style>
        body { background-color: #f4f4f4; display: flex; justify-content: center; padding-top: 50px; margin: 0; }

        .email-container {
            position: relative;
            width: 600px; /* Displays at 600px for crispness */
        }

        /* The base and hover graphics are stacked */
        .base-img, .hover-img {
            width: 100%;
            height: auto;
            display: block;
        }

        .hover-img {
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0; /* Hidden by default */
            pointer-events: none; /* Let the clicks pass through to the map below */
            transition: opacity 0.2s;
        }

        /* This class will be toggled by the image map */
        .show-hover {
            opacity: 1 !important;
        }
    </style>
</head>
<body>

    <div class="email-container">
        <!-- 1. The Graphics -->
        <img src="Banter-email-sample.png" class="base-img" usemap="#button-map">
        <img src="button.png" id="hoverGraphic" class="hover-img">

        <!-- 2. The Image Map -->
        <!-- "coords" are: x1, y1 (top-left) and x2, y2 (bottom-right) -->
        <map name="button-map">
            <area shape="rect" 
                  coords="61,1125,705,1301" 
                  href="https://your-link.com" 
                  onmouseover="document.getElementById('hoverGraphic').classList.add('show-hover')" 
                  onmouseout="document.getElementById('hoverGraphic').classList.remove('show-hover')">
        </map>
    </div>

</body>
</html>
