<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banter Email Campaign Preview</title>
    <style>
        /* General page styling */
        body {
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            padding: 50px 20px;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* The container set to 600px to make your 1200px graphics look high-res/crisp */
        .email-container {
            position: relative;
            width: 600px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); /* Adds a nice "email card" look */
            line-height: 0; /* Removes tiny gaps under images */
        }

        /* The main graphic everyone sees */
        .base-graphic {
            width: 100%;
            height: auto;
            display: block;
        }

        /* The transparent button layer - perfectly aligned because it's the same size */
        .button-hover-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: auto;
            opacity: 0; /* Hidden by default */
            transition: opacity 0.2s ease-in-out;
            cursor: pointer;
        }

        /* The magic swap: when you hover over the container, the button appears */
        .email-container:hover .button-hover-layer {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="email-container">
        <!-- Main Email Sample -->
        <img src="Banter-email-sample.png" alt="Banter Email Content" class="base-graphic">

        <!-- Clickable Link and Hover Button -->
        <a href="https://www.linkedin.com/in/jill-clark-26b956384/" target="_blank">
            <img src="button.png" alt="Call to Action" class="button-hover-layer">
        </a>
    </div>

</body>
</html>
