<!DOCTYPE html>
<html>
<head>
    <title>Banter Email Preview</title>
    <style>
        body {
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            padding-top: 50px;
            margin: 0;
        }

        /* This container keeps both images in the same spot */
        .email-container {
            position: relative;
            width: 600px; /* Adjust this to match your actual image width */
        }

        .main-graphic {
            display: block;
            width: 100%;
            height: auto;
        }

        /* The transparent button layer */
        .button-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: auto;
            transition: opacity 0.3s ease; /* Makes the hover feel smooth */
            opacity: 0.7; /* Optional: start slightly faded to see the effect */
        }

        /* The "Hover" effect */
        .button-overlay:hover {
            opacity: 1; /* Brightens or changes when mouse is over it */
            cursor: pointer;
            filter: brightness(1.2); /* Makes the button "pop" on hover */
        }
    </style>
</head>
<body>

    <div class="email-container">
        <!-- Your main sample graphic -->
        <img src="Banter-email-sample.png" class="main-graphic">

        <!-- Your transparent button graphic stacked on top -->
        <a href="https://www.linkedin.com/in/jill-clark-26b956384/">
            <img src="button.png" class="button-overlay">
        </a>
    </div>

</body>
</html>
